<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ask Maya</title>

  <style>
    body {
      font-family: Georgia, serif;
      background: linear-gradient(#f7f4ef, #efe7dc);
      text-align: center;
      padding: 60px 20px 40px;
      color: #333;
      margin: 0;
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 18px;
      color: #666;
      margin-bottom: 30px;
    }

    .maya {
      width: 220px;
      margin: 20px auto;
      display: block;
      filter: drop-shadow(0px 10px 25px rgba(0,0,0,0.15));
      animation: floatMaya 6s ease-in-out infinite;
    }

    @keyframes floatMaya {
      0%   { transform: translateY(0px); }
      50%  { transform: translateY(-6px); }
      100% { transform: translateY(0px); }
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 10px;
    }

    button {
      padding: 14px 22px;
      font-size: 17px;
      border: none;
      border-radius: 12px;
      background: #e8b4b8;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    button:hover {
      background: #e39aa0;
      transform: scale(1.04);
    }

    #wisdom {
      margin-top: 40px;
      max-width: 560px;
      margin-left: auto;
      margin-right: auto;
      opacity: 0;
      transition: opacity 0.6s;
      min-height: 160px;
      padding: 0 10px;
    }

    .maya-line {
      font-size: 30px;
      line-height: 1.4;
      margin-bottom: 14px;
    }

    .maya-reflection {
      font-size: 21px;
      line-height: 1.5;
      color: #666;
      font-style: italic;
      margin-bottom: 16px;
    }

    .maya-signoff {
      font-size: 18px;
      color: #888;
    }

    .note {
      margin-top: 18px;
      font-size: 14px;
      color: #7a7a7a;
      min-height: 20px;
    }

    .tribute {
      margin-top: 80px;
      font-size: 14px;
      color: #888;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 34px;
      }

      .maya {
        width: 180px;
      }

      .maya-line {
        font-size: 26px;
      }

      .maya-reflection {
        font-size: 19px;
      }

      button {
        width: 100%;
        max-width: 280px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🐾 Ask Maya</h1>

    <img src="maya.png" class="maya" alt="Cartoon of Maya the cat">

    <p class="subtitle">A small piece of wisdom from a very wise cat.</p>

    <div class="buttons">
      <button onclick="askMaya()">Ask Maya</button>
    </div>
    
    <div id="wisdom"></div>
    
    <div class="buttons" id="shareButtons" style="display:none;">
      <button onclick="shareWisdom()">Share Wisdom</button>
      <button onclick="sharePage()">Share Page</button>
    </div>

    <div id="wisdom"></div>
    <div class="note" id="note"></div>

    <p class="tribute">Inspired by Maya, a very wise cat.</p>
  </div>

      },
      
      {

        reflection: "This strategy works surprisingly often."
      }
    ];

    let currentWisdom = "";

    function setNote(message) {
      const note = document.getElementById("note");
      note.innerText = message;

      setTimeout(() => {
        if (note.innerText === message) {
          note.innerText = "";
        }
      }, 2500);
    }

    function askMaya() {
      const random = wisdom[Math.floor(Math.random() * wisdom.length)];
      currentWisdom = `${random.line} ${random.reflection}`;

      const wisdomBox = document.getElementById("wisdom");
      wisdomBox.style.opacity = 0;

      setTimeout(() => {
        wisdomBox.innerHTML = `
          <div class="maya-line">${random.line}</div>
          <div class="maya-reflection">${random.reflection}</div>
          <div class="maya-signoff">— Maya 🐾</div>
        `;
        wisdomBox.style.opacity = 1;
      }, 200);
    }

    async function sharePage() {
      const shareData = {
        title: "Ask Maya",
        text: "A small piece of wisdom from a very wise cat.",
        url: window.location.href
      };

      if (navigator.share) {
        try {
          await navigator.share(shareData);
        } catch (err) {}
      } else {
        try {
          await navigator.clipboard.writeText(window.location.href);
          setNote("Page link copied.");
        } catch (err) {
          setNote("Could not copy the page link.");
        }
      }
    }

    async function shareWisdom() {
      if (!currentWisdom) {
        setNote("Ask Maya first.");
        return;
      }

      const message = `${currentWisdom} — Maya 🐾`;

      if (navigator.share) {
        try {
          await navigator.share({
            title: "Ask Maya",
            text: message,
            url: window.location.href
          });
        } catch (err) {}
      } else {
        try {
          await navigator.clipboard.writeText(message + " " + window.location.href);
          setNote("Wisdom copied.");
        } catch (err) {
          setNote("Could not copy the wisdom.");
        }
      }
    }
  </script>

</body>
</html>
