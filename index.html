<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ask Maya</title>

  <style>
    body{
      font-family: Georgia, serif;
      background: linear-gradient(#f7f4ef, #efe7dc);
      text-align:center;
      padding:60px 20px 40px;
      color:#333;
      margin:0;
    }

    .container{
      max-width:700px;
      margin:0 auto;
    }

    h1{
      font-size:42px;
      margin-bottom:10px;
    }

    .subtitle{
      font-size:18px;
      color:#666;
      margin-bottom:30px;
    }

    .maya{
      width:220px;
      margin:20px auto;
      display:block;
      filter: drop-shadow(0px 10px 25px rgba(0,0,0,0.15));
      transition: transform 0.15s;
      transform-origin:center center;
    }

    .blink{
      animation: blink 0.25s;
    }

    @keyframes blink{
      0%   { transform: scaleY(1); }
      50%  { transform: scaleY(0.08); }
      100% { transform: scaleY(1); }
    }

    .buttons{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:12px;
      margin-top:10px;
    }

    button{
      padding:14px 22px;
      font-size:17px;
      border:none;
      border-radius:12px;
      background:#e8b4b8;
      color:white;
      cursor:pointer;
      transition:all 0.2s;
      box-shadow:0 6px 18px rgba(0,0,0,0.08);
    }

    button:hover{
      background:#e39aa0;
      transform:scale(1.04);
    }

    #wisdom{
      margin-top:40px;
      font-size:28px;
      line-height:1.5;
      max-width:560px;
      margin-left:auto;
      margin-right:auto;
      font-style:italic;
      opacity:0;
      transition:opacity 0.6s;
      min-height:84px;
      padding:0 10px;
    }

    .tribute{
      margin-top:80px;
      font-size:14px;
      color:#888;
    }

    .note{
      margin-top:18px;
      font-size:14px;
      color:#7a7a7a;
      min-height:20px;
    }

    @media (max-width: 600px){
      h1{
        font-size:34px;
      }

      .maya{
        width:180px;
      }

      #wisdom{
        font-size:24px;
      }

      button{
        width:100%;
        max-width:280px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🐾 Ask Maya</h1>

    <img src="maya.png" class="maya" id="maya" alt="Cartoon of Maya the cat">

    <p class="subtitle">A small piece of wisdom from a very wise cat.</p>

    <div class="buttons">
      <button onclick="askMaya()">Ask Maya</button>
      <button onclick="sharePage()">Share Page</button>
      <button onclick="shareWisdom()">Share Wisdom</button>
    </div>

    <div id="wisdom"></div>
    <div class="note" id="note"></div>

    <p class="tribute">Inspired by Maya, a very wise cat.</p>
  </div>

  <audio id="purrSound" preload="auto">
    <source src="purr.mp3" type="audio/mpeg">
  </audio>

  <script>
    const wisdom = [
      "Not everything needs chasing.",
      "Sit in the sun for a while.",
      "Rest first. Decide later.",
      "Curiosity makes the day interesting.",
      "Drink water. Stretch a little.",
      "Find the warmest spot and stay there.",
      "You don’t need to fix everything today.",
      "Sometimes ignoring the problem is wisdom.",
      "Take life one paw at a time.",
      "The world can wait while you nap.",
      "Look out the window for a bit.",
      "Slow down. You are allowed to.",
      "A soft place and a deep breath help.",
      "Eat something good.",
      "Peace often arrives quietly.",
      "A small step is still progress.",
      "The sun always returns.",
      "Today is a good day for a nap.",
      "Listen before reacting.",
      "Comfort matters.",
      "Enjoy every day.",
      "Stretch slowly.",
      "Find something interesting to watch.",
      "Nothing wrong with contemplating.",
      "You are allowed to choose your food.",
      "There is always a good time for a nap.",
      "Rest is not laziness.",
      "The sun heals everthing ",
      "Patience is a virtue."
    ];

    let currentWisdom = "";

    function setNote(message) {
      document.getElementById("note").innerText = message;
      setTimeout(() => {
        if (document.getElementById("note").innerText === message) {
          document.getElementById("note").innerText = "";
        }
      }, 2500);
    }

    function blinkMaya() {
      const maya = document.getElementById("maya");
      maya.classList.add("blink");
      setTimeout(() => {
        maya.classList.remove("blink");
      }, 250);
    }

    function playPurr() {
      const purr = document.getElementById("purrSound");
      if (!purr) return;

      purr.currentTime = 0;
      purr.play().catch(() => {
        // Some browsers may block autoplay-like audio behavior
        // until direct interaction; button click usually allows it.
      });
    }

    function askMaya() {
      const random = wisdom[Math.floor(Math.random() * wisdom.length)];
      currentWisdom = random;

      const wisdomBox = document.getElementById("wisdom");
      wisdomBox.style.opacity = 0;

      blinkMaya();
      playPurr();

      setTimeout(() => {
        wisdomBox.innerText = '"' + random + '"';
        wisdomBox.style.opacity = 1;
      }, 200);
    }

    async function sharePage() {
      const shareData = {
        title: "Ask Maya",
        text: "A small piece of wisdom from a very wise cat.",
        url: window.location.href
      };

      if (navigator.share) {
        try {
          await navigator.share(shareData);
        } catch (err) {
          // User cancelled or browser stopped it
        }
      } else {
        try {
          await navigator.clipboard.writeText(window.location.href);
          setNote("Page link copied.");
        } catch (err) {
          setNote("Could not copy the page link.");
        }
      }
    }

    async function shareWisdom() {
      if (!currentWisdom) {
        setNote("Ask Maya first.");
        return;
      }

      const message = `"${currentWisdom}" — Ask Maya`;

      if (navigator.share) {
        try {
          await navigator.share({
            title: "Ask Maya",
            text: message,
            url: window.location.href
          });
        } catch (err) {
          // User cancelled or browser stopped it
        }
      } else {
        try {
          await navigator.clipboard.writeText(message + " " + window.location.href);
          setNote("Wisdom copied.");
        } catch (err) {
          setNote("Could not copy the wisdom.");
        }
      }
    }
  </script>

</body>
</html>
